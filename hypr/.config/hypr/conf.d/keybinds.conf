# Teclado: idioma EN/ES (F1) y disposicion QWERTY/DVORAK (F2).
# Indicador en waybar; tambien click izq/der sobre el.
bind = SUPER, F1, exec, ~/.config/waybar/scripts/kb_switch.sh lang
bind = SUPER, F2, exec, ~/.config/waybar/scripts/kb_switch.sh variant

# abrir terminal
bind = SUPER, T, exec, kitty

# cerrar ventana actual
bind = ALT, F4, killactive

# cerrar sesion
bind = SUPER, F12, exit

# abrir explorador de archivos
bind = SUPER, E, exec, nautilus

# abridor de apps
bindr = SUPER, SUPER_L, exec, ~/.config/rofi/scripts/launch_rofi.sh
# abrir brave
bind = SUPER, B, exec, brave

# abrir vesktop
bind = SUPER, V, exec, vesktop

# abrir spotify
bind = SUPER, S, exec, spotify

# abrir teamspeak
bind = SUPER, G, exec, teamspeak

# launcher de URLs Brave con historial (autocompletado + Shift+Supr borra)
bind = SUPER, W, exec, ~/.local/bin/rofi-brave-url

# marcar notificaciones como leidas (quita el numero, NO borra notis)
bind = SUPER, H, exec, ~/.config/waybar/scripts/notif.sh seen; pkill -RTMIN+8 waybar

# --- Grupos de ventanas (tabs, ideal para apilar kitty) ---
bind = SUPER, G, togglegroup                        # crea grupo / deshace grupo entero
bind = SUPER SHIFT, G, moveoutofgroup               # saca SOLO la ventana activa del grupo
bind = SUPER CTRL, Tab, changegroupactive, f        # siguiente pestaña del grupo
bind = SUPER CTRL SHIFT, Tab, changegroupactive, b  # pestaña anterior

# toggle compartir pantalla via camara virtual (ctrl izq + ctrl der)
bind = CTRL, Control_R, exec, /home/wdona/.local/bin/sharecam-toggle

# pantalla completa
bind = SUPER, F11, fullscreen

# mover ventana dentro del monitor
bind = CTRL ALT, right, movewindow, r
bind = CTRL ALT, left, movewindow, l
bind = CTRL ALT, up, movewindow, u
bind = CTRL ALT, down, movewindow, d

# mover ventana al otro monitor
bind = CTRL ALT SHIFT, right, movewindow, mon:r
bind = CTRL ALT SHIFT, left, movewindow, mon:l
bind = CTRL ALT SHIFT, up, movewindow, mon:u
bind = CTRL ALT SHIFT, down, movewindow, mon:d

# mover el workspace actual entero al otro monitor
bind = SUPER ALT, right, movecurrentworkspacetomonitor, r
bind = SUPER ALT, left, movecurrentworkspacetomonitor, l

# cambiar entre flotante y no flotante
bind = SUPER, Space, togglefloating

# Maximizar: manda la ventana al special "fullscreen" (solo 1 app, a pantalla completa)
bind = SUPER, Up, exec, ~/.config/hypr/scripts/special_fs.sh

# Sacar la ventana de fullscreen y del special, devolviendola a su workspace de origen
bind = SUPER, Down, exec, ~/.config/hypr/scripts/special_fs_exit.sh

# --- CAMBIAR DE WORKSPACE (Ver el espacio) ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, `, workspace, special
bind = SUPER, 0, workspace, 4788887

# Claude Code desplegable (special workspace propio, independiente del `special` de fullscreen)
bind = SUPER, C, exec, ~/.config/hypr/scripts/toggle_claude.sh

# --- MOVER VENTANA ACTIVA A OTRO WORKSPACE ---
# Con esto, la ventana se va, pero tú te quedas donde estás
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, `, exec, ~/.config/hypr/scripts/special_fs.sh
bind = SUPER SHIFT, 0, movetoworkspacesilent, 4788887

# --- MOVER VENTANA Y SEGUIRLA (Moverte con el juego) ---
# Muy útil para mandar el juego al workspace 3 y saltar allí al instante
bind = CTRL SUPER, 1, movetoworkspace, 1
bind = CTRL SUPER, 2, movetoworkspace, 2
bind = CTRL SUPER, 3, movetoworkspace, 3
bind = CTRL SUPER, 4, movetoworkspace, 4
bind = CTRL SUPER, 5, movetoworkspace, 5
bind = CTRL SUPER, 6, movetoworkspace, 6
bind = CTRL SUPER, 7, movetoworkspace, 7
bind = CTRL SUPER, 8, movetoworkspace, 8
bind = CTRL SUPER, 9, movetoworkspace, 9
bind = CTRL SUPER, `, exec, ~/.config/hypr/scripts/special_fs.sh
bind = CTRL SUPER, 0, movetoworkspace, 4788887

# Control de medios
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Control de volumen (rueda G435) — barra SwayOSD en monitor con foco; fallback wpctl
bindel = , XF86AudioRaiseVolume, exec, ~/.local/bin/osd-vol up
bindel = , XF86AudioLowerVolume, exec, ~/.local/bin/osd-vol down
bindl  = , XF86AudioMute, exec, ~/.local/bin/osd-vol mute

# Switcher de ventanas (salta al workspace+monitor de la ventana elegida)
bind = ALT, Tab, exec, ~/.local/bin/hypr-window-switcher

# OCR: seleccionas región con texto -> al portapapeles (necesita tesseract)
bind = SUPER, O, exec, ~/.local/bin/ocr-screen

# Dashboard de hardware (eww) — abre/cierra
bind = SUPER, D, exec, ~/.config/eww/scripts/toggle_dash.sh

# Captura de área seleccionada (--freeze evita banda blanca/artifacts) y editor swappy
bind = , Print, exec, grimblast --freeze save area - | swappy -f -
# Captura de pantalla completa al portapapeles
bind = SHIFT, Print, exec, grimblast copy screen

# Shortcut para guardar el clip con notificación
bind = CTRL SHIFT, S, exec, notify-send "Grabador" "Clip guardado" && pkill -f -SIGUSR1 gpu-screen-recorder

# bloquear la pantalla
bind = SUPER, L, exec, hyprlock

# Permitir mover las ventanas con el ratón usando SUPER (Windows) + Arrastrar
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
