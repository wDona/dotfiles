input {
    # dvorak PRIMERO (idx 0): Hyprland resuelve los binds segun el layout 0.
    # El usuario teclea en dvorak -> los atajos deben caer en posiciones dvorak.
    # idx: 0=us-dvorak 1=us-qwerty 2=es-dvorak 3=es-qwerty
    kb_layout = us,us,es,es
    kb_variant = dvorak,,dvorak,

    accel_profile = flat
    force_no_accel = true
}

# freesync
misc {
    vrr = 1
    # Evita que el sistema suspenda el renderizado de la ventana de fondo
    always_follow_on_dnd = true
    # IMPORTANTE: Esto evita que los juegos se minimicen al perder el foco
    focus_on_activate = true
    # Evita que las animaciones se pausen para ahorrar energía
    # vfr = false
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

render {
    direct_scanout = true
}
