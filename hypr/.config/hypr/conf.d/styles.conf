# en general
general {
    # El espacio entre la ventana y el borde de la pantalla
    gaps_in = 2     # Espacio entre ventanas
    gaps_out = 5    # Espacio entre ventana y borde de monitor (ponlo en 0 si quieres que toquen el borde)

    border_size = 2
    col.active_border = rgba(d946efff) rgba(f472b6ff) 90deg
    col.inactive_border = rgba(4a4a5aaa)

    allow_tearing = false
    layout = dwindle # Aunque uses float, esto define el comportamiento base
}

# Grupos de ventanas (tabs estilo navegador) — pensado para apilar terminales kitty
group {
    col.border_active = rgba(d946efff) rgba(f472b6ff) 90deg
    col.border_inactive = rgba(4a4a5aaa)
    groupbar {
        enabled = true
        font_size = 11
        height = 16
        gradients = true
        col.active = rgba(d946efcc)
        col.inactive = rgba(4a4a5aaa)
        text_color = rgba(ffffffff)
    }
}

animations {
    enabled = yes

    # Curvas
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = easeOut, 0.05, 0.9, 0.1, 1.0
    bezier = easeIn, 0.4, 0.0, 1.0, 1.0

    # Animaciones base (necesarias para que el sistema funcione)
    animation = windows, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeIn, slide
    animation = fade, 1, 4, easeOut
    animation = workspaces, 1, 5, easeOut, slide
    animation = layers, 1, 3, easeOut, slide

    # Borde animado infinito
    # Baja el 30 para que vaya más rápido (ej: 8 = muy rápido, 20 = medio)
    animation = borderangle, 1, 30, linear, loop
}

layerrule {
    name = swaync-control-center
    animation = slide top
}

layerrule {
    name = swaync-notification-window
    animation = slide top
}

layerrule {
    name = rofi
    animation = slide left
}

# Blur detras de rofi (fondo translucido en config.rasi -> @bg-col alpha b8).
layerrule = blur true, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

# Blur real detrás de los componentes de waybar.
# Fondo de barra transparente (CSS): las zonas vacias (alpha 0) no
# dibujan nada, asi el blur solo se ve bajo los modulos translucidos.
layerrule = blur true, match:namespace waybar
# Solo difumina donde alpha >= 0.1: los modulos translucidos.
# Las zonas 100% transparentes de la barra no se difuminan.
layerrule = ignore_alpha 0.1, match:namespace waybar

# en general
decoration {
    rounding = 16    # <--- Sube este número para esquinas más redondas (10-15 es lo ideal)

    # Blur (hace que el fondo de la ventana sea translúcido si la app lo permite)
    blur {
        enabled = true
        size = 7
        passes = 2
    }
}
