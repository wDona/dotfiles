# Iniciar el buffer de repetición al arrancar (ejemplo: últimos 30 seg)
exec-once = mkdir -p ~/Videos/Clips
# Iniciar el grabador al arrancar (usando la ruta absoluta para evitar errores)
exec-once = gpu-screen-recorder -w $(hyprctl monitors -j | jq -r '.[] | select(.focused==true) | .name') -f 60 -a default_output -r 30 -o $HOME/Videos/Clips

exec-once = systemctl --user start hyprpolkit-agent

# Daemon SwayOSD (barra on-screen). --top-margin 0.95 = casi pegada al borde inferior
exec-once = swayosd-server --top-margin 0.95

# inicia la barra de tareas
exec-once = waybar

# estado inicial del teclado (us qwerty)
exec-once = ~/.config/waybar/scripts/kb_switch.sh init

# sistema de notificaciones
exec-once = swaync
exec-once = ~/.config/swaync/steam_notif.sh

# sonido
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber

# 1. Forzar variables de entorno en D-Bus
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. Iniciar infraestructura de audio/video manualmente sin depender de servicios Systemd
# exec-once = systemctl --user restart pipewire pipewire-pulse wireplumber

# 3. Arrancar portales limpios
exec-once = systemctl --user stop xdg-desktop-portal xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal -r &

# Submap activo solo mientras el calendario eww esta abierto:
# ESC lo cierra. El resto de teclas pasan normal a las apps, pero
# los binds globales quedan suspendidos hasta cerrar (toggle/ESC).
submap = calendar
bind = , escape, exec, ~/.config/eww/scripts/close_cal.sh
submap = reset
