windowrule {
    name = gnome-look

    opacity = 0.85 0.75
}

# discord gay
windowrule {
    name = fake-discord
    match:class = vesktop

    opacity = 0.90 0.87
}

# vesktop siempre en workspace 2
windowrule {
    name = vesktop-ws2
    match:class = vesktop
    workspace = 2 silent
}

# teamspeak siempre en workspace 2
windowrule {
    name = teamspeak-ws2
    match:class = (?i).*teamspeak.*
    workspace = 2 silent
}

# spotify siempre en workspace 3
windowrule {
    name = spotify-ws3
    match:class = spotify
    workspace = 3 silent
}

# vs code
windowrule {
    name = vscode-transparency
    match:class = code-url-handler
    opacity = 0.90 0.85
}

# calendario
windowrule {
    name = gsimplecal-float
    match:class = gsimplecal
    float = true
    move = 770 48
    pin = true
    opacity = 0.95 0.95
}

#
windowrule {
    name = swaync-panel
    # La clase exacta suele ser esta o 'SwayNotificationCenter'
    match:class = swaync-control-center

    float = on
    # Movemos al 37% horizontal y 10px desde arriba
    move = 37% 10
    # Forzamos que la ventana "nazca" con este tamaño
    size = 550 100
}

# Regla extra para las notificaciones flotantes (los globitos)
windowrule {
    name = swaync-globitos
    match:class = swaync-notification-window
    move = 37% 10
}

# intentar mover al centro el panel de notificaciones
windowrule {
    name = swaync-centro
    match:class = ^(swaync-control-center)$

    float = on
    move = 35% 10
    # Aquí forzamos el tamaño inicial y bloqueamos que crezca solo
    size = 550 400
    center = off
}

# intento de difuminar el fondo de las notificaciones
blurls = swaync-control-center
blurls = swaync-notification-window

# ── Claude Code desplegable ──
# Terminal kitty (class claude-term) en special:claude. Flotante, centrada, no full.
# Formato linea: el bloque windowrule{} no aplica size/center en 0.55.
windowrule {
    name = claude-dropdown
    match:class = claude-term
    float = true
    size = 700 1023
    move = 1215 52
}

# ── Calendario eww ──
# Dialogo flotante para editar notas del calendario (GTK4 propio)
windowrule {
    name = eww-note
    match:class = eww.note
    float = true
    center = true
}
