# fondo de pantalla (logica en el script; se configura desde el panel de
# Personalizacion de eww. El ultimo fondo se guarda en ~/.config/wallpaper.conf)
exec-once = ~/.config/hypr/scripts/wallpaper.sh restore

# tema oscuro / apariencia (tema GTK, iconos, cursor). Logica en el script;
# se configura desde el panel de Ajustes de eww. Estado en ~/.config/appearance.conf
exec-once = ~/.config/hypr/scripts/appearance.sh restore
