general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
}

listener {
    timeout = 1200       # 5 minutos sin actividad
    on-timeout = hyprlock
}

listener {
    timeout = 3600       # 10 minutos, apaga pantalla
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

