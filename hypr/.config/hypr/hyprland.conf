input {
    kb_layout = us
    kb_variant = dvorak
}

# abrir terminal
bind = SUPER, T, exec, kitty

# cerrar ventana actual
bind = ALT, F4, killactive

# cerrar sesion
bind = SUPER, F12, exit

# abrir explorador de archivos
bind = SUPER, E, exec, nautilus

# abridor de apps
bindr = SUPER, SUPER_L, exec, ~/.config/rofi/scripts/launch_rofi.sh
# abrir brave
bind = SUPER, B, exec, brave

# pantalla completa
bind = SUPER, F11, fullscreen

# mover ventana dentro del monitor
bind = CTRL ALT, right, movewindow, r
bind = CTRL ALT, left, movewindow, l
bind = CTRL ALT, up, movewindow, u
bind = CTRL ALT, down, movewindow, d

# mover ventana al otro monitor
bind = CTRL ALT SHIFT, right, movewindow, mon:r
bind = CTRL ALT SHIFT, left, movewindow, mon:l
bind = CTRL ALT SHIFT, up, movewindow, mon:u
bind = CTRL ALT SHIFT, down, movewindow, mon:d

bind = SUPER, N, exec, swaync-client -t -sw

# cambiar entre flotante y no flotante
bind = SUPER, Space, togglefloating

# Maximizar
bind = SUPER, Up, movetoworkspace, special

# Dejar la ventana en foco al workspace actula
bind = SUPER, Down, movetoworkspace, e+0

# --- CAMBIAR DE WORKSPACE (Ver el espacio) ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, special

# --- MOVER VENTANA ACTIVA A OTRO WORKSPACE ---
# Con esto, la ventana se va, pero tú te quedas donde estás
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, 0, movetoworkspacesilent, special

# --- MOVER VENTANA Y SEGUIRLA (Moverte con el juego) ---
# Muy útil para mandar el juego al workspace 3 y saltar allí al instante
bind = CTRL SUPER, 1, movetoworkspace, 1
bind = CTRL SUPER, 2, movetoworkspace, 2
bind = CTRL SUPER, 3, movetoworkspace, 3
bind = CTRL SUPER, 4, movetoworkspace, 4
bind = CTRL SUPER, 5, movetoworkspace, 5
bind = CTRL SUPER, 6, movetoworkspace, 6
bind = CTRL SUPER, 7, movetoworkspace, 7
bind = CTRL SUPER, 8, movetoworkspace, 8
bind = CTRL SUPER, 9, movetoworkspace, 9
bind = CTRL SUPER, 0, movetoworkspace, special
bind = CTRL SUPER, `, movetoworkspace, 4788887

# Control de medios
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Captura de área seleccionada y abrir editor swappy
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
# Captura de pantalla completa al portapapeles
bind = SHIFT, Print, exec, grim - | wl-copy

# Iniciar el buffer de repetición al arrancar (ejemplo: últimos 30 seg)
exec-once = mkdir -p ~/Videos/Clips
# Iniciar el grabador al arrancar (usando la ruta absoluta para evitar errores)
exec-once = gpu-screen-recorder -w $(hyprctl monitors -j | jq -r '.[] | select(.focused==true) | .name') -f 60 -a default_output -r 30 -o $HOME/Videos/Clips

# Shortcut para guardar el clip con notificación
bind = CTRL SHIFT, S, exec, notify-send "Grabador" "Clip guardado" && pkill -f -SIGUSR1 gpu-screen-recorder

# bloquear la pantalla
bind = SUPER, L, exec, hyprlock

# inicia la barra de tareas
exec-once = waybar

# sistema de notificaciones
exec-once = swaync
exec-once = ~/.config/swaync/steam_notif.sh

# Monitor AOC (Principal) a 165Hz
monitor = DP-2, 1920x1080@165, 0x0, 1

# Monitor Samsung (Secundario) a 60Hz posicionado a la derecha
monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

# freesync
misc {
    vrr = 1
    # Evita que el sistema suspenda el renderizado de la ventana de fondo
    always_follow_on_dnd = true
    # IMPORTANTE: Esto evita que los juegos se minimicen al perder el foco
    focus_on_activate = true
    # Evita que las animaciones se pausen para ahorrar energía
    vfr = false
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

render {
    direct_scanout = true
}

# sonido
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber

# Permitir mover las ventanas con el ratón usando SUPER (Windows) + Arrastrar
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# en general
general {
    # El espacio entre la ventana y el borde de la pantalla
    gaps_in = 2     # Espacio entre ventanas
    gaps_out = 5    # Espacio entre ventana y borde de monitor (ponlo en 0 si quieres que toquen el borde)
    
    border_size = 2
    col.active_border = rgba(ff00ffff) rgba(00ffffff) 270deg
    col.inactive_border = rgba(595959aa)

    allow_tearing = false
    layout = dwindle # Aunque uses float, esto define el comportamiento base
}

animations {
    enabled = yes

    # Curvas
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = easeOut, 0.05, 0.9, 0.1, 1.0
    bezier = easeIn, 0.4, 0.0, 1.0, 1.0

    # Animaciones base (necesarias para que el sistema funcione)
    animation = windows, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeIn, slide
    animation = fade, 1, 4, easeOut
    animation = workspaces, 1, 5, easeOut, slide
    animation = layers, 1, 3, easeOut, slide


    # Borde animado infinito
    # Baja el 30 para que vaya más rápido (ej: 8 = muy rápido, 20 = medio)
    animation = borderangle, 1, 30, linear, loop
}

layerrule {
    name = swaync-control-center
    animation = slide top
}

layerrule {
    name = swaync-notification-window
    animation = slide top
}

layerrule {
    name = rofi
    animation = slide left
}

# en general
decoration {
    rounding = 16    # <--- Sube este número para esquinas más redondas (10-15 es lo ideal)

    # Blur (hace que el fondo de la ventana sea translúcido si la app lo permite)
    blur {
        enabled = true
        size = 5
        passes = 2
    }
}

windowrule {
    name = gnome-look
    
    opacity = 0.85 0.75
}

# discord gay
windowrule {
    name = fake-discord
    match:class = vesktop

    opacity = 0.90 0.87
}

# vs code
windowrule {
    name = vscode-transparency
    match:class = code-url-handler
    opacity = 0.90 0.85
}

# calendario
windowrule {
    name = gsimplecal-float
    match:class = gsimplecal
    float = true
    move = 800 33
    pin = true
}

# 
windowrule {
    name = swaync-panel
    # La clase exacta suele ser esta o 'SwayNotificationCenter'
    match:class = swaync-control-center
    
    float = on
    # Movemos al 37% horizontal y 10px desde arriba
    move = 37% 10
    # Forzamos que la ventana "nazca" con este tamaño
    size = 550 100
}

# Regla extra para las notificaciones flotantes (los globitos)
windowrule {
    name = swaync-globitos
    match:class = swaync-notification-window
    move = 37% 10
}

# intentar mover al centro el panel de notificaciones
windowrule {
    name = swaync-centro
    match:class = ^(swaync-control-center)$
    
    float = on
    move = 35% 10
    # Aquí forzamos el tamaño inicial y bloqueamos que crezca solo
    size = 550 400
    center = off
}

# intento de difuminar el fondo de las notificaciones
blurls = swaync-control-center
blurls = swaync-notification-window

# fondo de pantalla
exec-once = mpvpaper -o "--loop --no-audio --vo=gpu --hwdec=auto" '*' /home/wdona/.local/share/Steam/steamapps/workshop/content/431960/2517584622/Cyberpunk_night_city_animated_wallpaper_PETEOMG_exclusive_no_opener_sound_original_panels.mp4

# tema oscuro
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Orchis-Purple-Dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = /usr/lib/xdg-desktop-portal-gnome &

exec-once = hypridle
