# ─── Modular Hyprland Configuration ──────────────────────────────────────
# Versión modularizada para mejor mantenibilidad

# Environment (cursor, variables)
source = ~/.config/hypr/conf.d/env.conf

# Input config
source = ~/.config/hypr/conf.d/general.conf

# Keybindings
source = ~/.config/hypr/conf.d/keybinds.conf

# Monitor & Workspace config
source = ~/.config/hypr/conf.d/monitors.conf

# Visual styles (colors, animations, decoration)
source = ~/.config/hypr/conf.d/styles.conf

# Window rules
source = ~/.config/hypr/conf.d/window-rules.conf

# Wallpaper & appearance
source = ~/.config/hypr/conf.d/wallpaper.conf

# Startup services & daemons
source = ~/.config/hypr/conf.d/exec.conf

# ─── Overrides del panel de Ajustes (gaps, borde, rounding) ───────────────
# Se carga al final para ganar sobre los valores base. Lo genera hypr_tweak.sh
source = ~/.config/hypr/conf.d/overrides.conf